<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matthew // Pushup Counter</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px;
        }
        .container {
            width: 400px;
            background: #161b22;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #58a6ff; text-align: center; font-size: 1.5rem; }
        .stat-box {
            background: #0d1117;
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
            border-left: 4px solid #238636;
        }
        .label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; }
        .value { font-size: 1.8rem; font-weight: bold; display: block; }
        
        /* Progress Bar Styles */
        .percentage-bar {
            height: 10px;
            background: #30363d;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }
        .percentage-fill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            border-radius: 5px;
            transition: width 0.8s ease-in-out; 
        }
        
        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 0.85rem;
            color: #8b949e;
        }

        /* Fixed Height for Quote to prevent jumping when loading */
        .quote-container {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        .quote { 
            font-style: italic; 
            font-size: 0.9rem; 
            color: #8b949e; 
            text-align: center; 
        }
        strong { color: #58a6ff; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <h1>PUSHUP COUNTER</h1>
    
    <div class="stat-box">
        <span class="label">Total Pushups (All-Time)</span>
        <span class="value">310</span> 
    </div>

    <div class="stat-box" style="border-left-color: #0b8160;">
        <span class="label">Daily Pushups (Count)</span>
        <span class="value" id="current-count">10</span>
    </div>

    <div class="stat-box" style="border-left-color: #bc8cff;">
        <span class="label">Daily Pushups Streak</span>
        <span class="value">4 Days</span>
    </div>

    <div class="stat-box" style="border-left-color: #58a6ff;">
        <span class="label">Daily Goal Progress</span>
        <div class="percentage-bar">
            <div class="percentage-fill" id="progress-fill"></div>
        </div>
        <div class="progress-labels">
            <span id="start-val">0</span>
            <span id="goal-val">50</span> 
        </div>
    </div>

    <div class="quote-container">
        <p class="quote" id="quote-text">"Syncing motivation from the cloud..."</p>
    </div>
</div>

<script>
    const current = parseInt(document.getElementById('current-count').innerText);
    const goal = parseInt(document.getElementById('goal-val').innerText);
    
    let percentage = (current / goal) * 100;
    if (percentage > 100) percentage = 100;

    setTimeout(() => {
        document.getElementById('progress-fill').style.width = percentage + "%";
        document.getElementById('start-val').innerText = current;
    }, 200);

    // --- Reliability Update: High-Aura Local Quote Engine ---
    const auraQuotes = [
        { text: "The only limit to our realization of tomorrow is our doubts of today.", author: "FDR" },
        { text: "Precision and accuracy are the bridge between effort and results.", author: "Physics 1.3" },
        { text: "Consistency is the ultimate software update for the human mind.", author: "Lead Dev" },
        { text: "300 pushups is just the beginning of the ascension.", author: "The Counter" },
        { text: "Discipline is doing what needs to be done, even when you feel like a zombie.", author: "Anon" }
    ];

    function loadLocalQuote() {
        const quoteEl = document.getElementById('quote-text');
        // Selects a random quote from our local list
        const randomQuote = auraQuotes[Math.floor(Math.random() * auraQuotes.length)];
        quoteEl.innerHTML = `"${randomQuote.text}"<br><strong>— ${randomQuote.author}</strong>`;
    }

    loadLocalQuote();
</script>

</body>
</html>
